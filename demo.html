<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light" />
  <title>finHub. · App</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: light only; scroll-behavior: smooth; }

    :root {
      --bg:        #f5f3f0;
      --surface:   #eeece8;
      --surface2:  #e8e6e2;
      --border:    #dddad5;
      --border2:   #ccc9c3;
      --ink:       #1a1a14;
      --ink2:      #3a3830;
      --muted:     #8a8070;
      --muted2:    #b4ac9e;
      --accent:    #3d6b52;
      --accent-bg: rgba(61,107,82,0.08);
      --accent2:   #c17a4a;
      --red:       #b85050;
      --red-bg:    rgba(184,80,80,0.08);
      --green:     #3d6b52;
      --green-bg:  rgba(61,107,82,0.08);
      --warn:      #c17a4a;
    }

    /* ── DARK MODE ── */
    body.dark {
      --bg:        #141414;
      --surface:   #1c1c1c;
      --surface2:  #242424;
      --border:    #2e2e2e;
      --border2:   #3a3a3a;
      --ink:       #e0e0e0;
      --ink2:      #c0c0c0;
      --muted:     #787878;
      --muted2:    #545454;
      --accent:    #5a9b78;
      --accent-bg: rgba(90,155,120,0.10);
      --accent2:   #c17a4a;
      --red:       #c47070;
      --red-bg:    rgba(196,112,112,0.10);
      --green:     #5a9b78;
      --green-bg:  rgba(90,155,120,0.10);
      --warn:      #c17a4a;
      color-scheme: dark;
    }
    body.dark { background: #141414 !important; color: #e0e0e0 !important; }
    body.dark body::before { opacity: 0.06; }
    body.dark .sidebar { background: #1c1c1c; }
    body.dark .sidebar.mobile-open { background: #f5f3f0 !important; }

    /* ── DARK MODE TOGGLE ── */
    .theme-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .theme-label {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border2);
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(16px); }

    body {
      background: #f5f3f0 !important;
      color: #1a1a14 !important;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      font-size: 14px;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    body.dark { background: #141414 !important; color: #e0e0e0 !important; }

    /* ── FINHUB LIVE TICKER ── */
    .finhub-ticker {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      max-width: 100vw; overflow: hidden;
      background: #1a2e24; color: #7ecba1;
      font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500;
      height: 26px; overflow: hidden; display: flex; align-items: center;
    }
    .finhub-ticker-label {
      background: #3d6b52; color: white; padding: 0 12px;
      font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; height: 100%; display: flex; align-items: center;
      flex-shrink: 0; white-space: nowrap;
    }
    .finhub-ticker-track {
      display: flex; gap: 0; white-space: nowrap;
      animation: finhub-scroll 35s linear infinite;
    }
    .finhub-ticker-track:hover { animation-play-state: paused; }
    @keyframes finhub-scroll {
      0%   { transform: translateX(100vw); }
      100% { transform: translateX(-50%); }
    }
    .finhub-ticker-item { padding: 0 20px; display: flex; align-items: center; gap: 7px; border-right: 1px solid #2d4a38; }
    .finhub-ticker-name { color: #a0c8b0; }
    .finhub-ticker-val  { color: #e8f5ee; font-weight: 600; }
    .finhub-ticker-chg.pos { color: #7ecba1; }
    .finhub-ticker-chg.neg { color: #e07070; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: radial-gradient(circle, #ccc9c3 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    /* ── SHELL ── */
    .shell { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; position: relative; z-index: 1; margin-top: 26px; max-width: 100vw; }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 40px 0;
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
      overflow-y: auto;
    }

    .wordmark {
      padding: 0 32px 28px;
      border-bottom: 1px solid var(--border);
    }

    nav { padding: 20px 0; flex: 1; }

    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 32px; width: 100%;
      font-size: 0.78rem; font-weight: 400; letter-spacing: 0.06em;
      color: var(--muted); cursor: pointer;
      transition: color 0.2s, background 0.2s;
      border: none; border-left: 2px solid transparent;
      background: transparent; text-align: left;
      font-family: 'DM Sans', sans-serif;
    }
    .nav-item:hover { color: var(--ink2); background: var(--surface2); }
    .nav-item.active { color: var(--accent); border-left-color: var(--accent); background: var(--accent-bg); font-weight: 500; }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }

    .nav-badge {
      margin-left: auto;
      background: var(--red);
      color: white;
      font-size: 0.6rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 10px;
      min-width: 18px;
      text-align: center;
    }

    .sidebar-footer { padding: 24px 32px 0; border-top: 1px solid var(--border); }
    .user-email { font-size: 0.72rem; color: var(--muted); margin-bottom: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .btn-logout {
      font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 400;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
      background: none; border: 1px solid var(--border); padding: 8px 16px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { color: var(--red); border-color: var(--red); }

    /* ── MAIN ── */
    main { padding: 52px; animation: fadeIn 0.4s ease both; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .page { display: none; }
    .page.active { display: block; }

    .page-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
    .page-sub { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.08em; margin-bottom: 44px; }

    /* ── ALERT BANNER ── */
    .alert-banner {
      background: #fff8f0;
      border: 1px solid var(--accent2);
      border-left: 4px solid var(--accent2);
      padding: 14px 20px;
      margin-bottom: 28px;
      display: none;
    }
    .alert-banner.show { display: block; }
    .alert-title { font-size: 0.72rem; font-weight: 500; color: var(--accent2); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    .alert-items { font-size: 0.82rem; color: var(--ink2); line-height: 1.8; }

    /* ── CARDS ── */
    .cards-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 36px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 28px 28px 24px; position: relative; }
    .card-label { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
    .card-value { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2.4rem; font-weight: 600; line-height: 1; letter-spacing: -0.01em; }
    .card-value.positive { color: var(--green); }
    .card-value.negative { color: var(--red); }
    .card-value.neutral  { color: var(--ink); }
    .card-sub { margin-top: 10px; font-size: 0.72rem; color: var(--muted2); }
    .card.income-card  { border-top: 2px solid var(--accent); }
    .card.expense-card { border-top: 2px solid var(--red); }
    .card.balance-card { border-top: 2px solid var(--accent2); }

    /* ── GLOBAL BUDGET BAR ── */
    .global-budget {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 28px;
      margin-bottom: 20px;
    }

    .gb-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .gb-title { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .gb-edit { font-size: 0.68rem; color: var(--accent); cursor: pointer; font-weight: 500; letter-spacing: 0.05em; }
    .gb-edit:hover { text-decoration: underline; }

    .gb-numbers {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 14px;
    }
    .gb-spent { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2rem; font-weight: 400; line-height: 1; }
    .gb-total { font-size: 0.82rem; color: var(--muted); }
    .gb-remaining { font-size: 0.82rem; font-weight: 500; }

    .gb-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .gb-fill { height: 100%; border-radius: 4px; transition: width 0.7s cubic-bezier(0.16,1,0.3,1); }
    .gb-footer { display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.68rem; color: var(--muted); }

    /* ── PERIOD TABS ── */
    .period-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); width: fit-content; }
    .period-tab {
      font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 9px 22px; cursor: pointer; border: none; background: transparent;
      color: var(--muted); transition: all 0.2s;
    }
    .period-tab.active { background: var(--accent); color: white; font-weight: 500; }

    /* ── CHARTS ── */
    .charts-row { display: grid; grid-template-columns: 1.4fr 1fr; gap: 20px; margin-bottom: 36px; }
    .chart-card { background: var(--surface); border: 1px solid var(--border); padding: 28px; }
    .chart-title { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 24px; }
    .chart-wrap { position: relative; height: 200px; }

    /* ── SECTION HEADER ── */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .section-title { font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }

    /* ── BUTTONS ── */
    .btn-primary {
      font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500;
      letter-spacing: 0.16em; text-transform: uppercase; background: var(--accent); color: #fdfaf4;
      border: none; padding: 10px 22px; cursor: pointer; transition: background 0.2s; border-radius: 4px;
    }
    .btn-primary:hover { background: #2d5240; }

    .btn-secondary {
      font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase; background: transparent; color: var(--muted);
      border: 1px solid var(--border); padding: 10px 20px; cursor: pointer;
      transition: color 0.2s, border-color 0.2s; border-radius: 4px;
    }
    .btn-secondary:hover { color: var(--ink2); border-color: var(--border2); }

    /* ── TX LIST ── */
    .tx-list { background: var(--surface); border: 1px solid var(--border); }
    .tx-item {
      display: flex; flex-direction: row; align-items: center;
      gap: 20px; padding: 14px 24px;
      border-bottom: 1px solid var(--border); transition: background 0.15s;
    }
    .tx-item:last-child { border-bottom: none; }
    .tx-item:hover { background: var(--surface2); }
    .tx-item-left { flex: 1; min-width: 0; }
    .tx-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .tx-item-actions { display: flex; gap: 8px; }
    .tx-desc { font-size: 0.9rem; color: var(--ink); font-weight: 400; }
    .tx-cat  { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }
    .tx-date { font-size: 0.72rem; color: var(--muted2); white-space: nowrap; margin-top: 3px; }
    .tx-amount { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.2rem; white-space: nowrap; }
    .tx-amount.income  { color: var(--green); }
    .tx-amount.expense { color: var(--red); }
    .tx-btn-edit {
      font-family: 'DM Sans', sans-serif; font-size: 0.6rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: transparent; color: var(--accent);
      border: 1px solid var(--accent); padding: 5px 14px;
      cursor: pointer; border-radius: 3px; transition: all 0.2s;
    }
    .tx-btn-edit:hover { background: var(--accent); color: white; }
    .tx-btn-del {
      font-family: 'DM Sans', sans-serif; font-size: 0.6rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--accent); color: white;
      border: 1px solid var(--accent); padding: 5px 14px;
      cursor: pointer; border-radius: 3px; transition: all 0.2s;
    }
    .tx-btn-del:hover { background: var(--red); border-color: var(--red); }
    .tx-delete { display: none; }

    /* ── MES COLAPSABLE ── */
    .tx-month-group { margin-bottom: 8px; }
    .tx-month-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 24px; background: var(--surface2);
      border: 1px solid var(--border); cursor: pointer;
      user-select: none; transition: background 0.15s;
    }
    .tx-month-header:hover { background: var(--border); }
    .tx-month-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); }
    .tx-month-summary { font-size: 0.72rem; color: var(--muted); display: flex; gap: 20px; align-items: center; }
    .tx-month-toggle { font-size: 0.7rem; color: var(--muted2); transition: transform 0.2s; }
    .tx-month-toggle.collapsed { transform: rotate(-90deg); }
    .tx-month-body { background: var(--surface); border: 1px solid var(--border); border-top: none; }
    .tx-month-body.hidden { display: none; }
    .tx-type-label {
      font-size: 0.62rem; font-weight: 600; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted);
      padding: 8px 24px 4px; background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    .tx-empty { padding: 52px; text-align: center; font-size: 0.82rem; color: var(--muted); }

    /* ── FILTERS ── */
    .filters { display: flex; gap: 8px; }
    .filter-chip {
      font-family: 'DM Sans', sans-serif; font-size: 0.7rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; padding: 7px 16px;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      cursor: pointer; transition: all 0.2s; border-radius: 4px;
    }
    .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
    .filter-chip.active { border-color: var(--accent); background: var(--accent); color: white; font-weight: 600; }

    /* ── BUDGETS ── */
    .budget-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .budget-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; }
    .budget-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
    .budget-cat { font-size: 0.9rem; font-weight: 400; color: var(--ink2); }
    .budget-amounts { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1rem; color: var(--muted); }
    .budget-amounts span { color: var(--ink); }
    .progress-bar { height: 3px; background: var(--border); margin: 14px 0 8px; }
    .progress-fill { height: 100%; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
    .progress-label { font-size: 0.68rem; color: var(--muted); }

    /* ── GOALS ── */
    .goals-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .goal-card { background: var(--surface); border: 1px solid var(--border); padding: 28px; border-top: 2px solid var(--accent2); }
    .goal-name { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.3rem; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
    .goal-meta { font-size: 0.7rem; color: var(--muted); margin-bottom: 22px; }
    .goal-bar { height: 2px; background: var(--border); margin-bottom: 10px; }
    .goal-fill { height: 100%; background: var(--accent2); transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
    .goal-numbers { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); }
    .goal-current { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.1rem; color: var(--accent2); }
    .goal-actions { display: flex; gap: 8px; margin-top: 18px; }
    .btn-ghost {
      font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 400;
      letter-spacing: 0.12em; text-transform: uppercase; background: transparent; color: var(--muted);
      border: 1px solid var(--border); padding: 8px 14px; cursor: pointer; flex: 1; text-align: center;
      transition: all 0.2s; border-radius: 4px;
    }
    .btn-ghost:hover { color: var(--accent2); border-color: var(--accent2); }

    /* ── REMINDERS ── */
    .reminder-list { background: var(--surface); border: 1px solid var(--border); }
    .reminder-item {
      display: grid; grid-template-columns: auto 1fr auto auto auto;
      align-items: center; gap: 16px; padding: 16px 24px;
      border-bottom: 1px solid var(--border); transition: background 0.15s;
    }
    .reminder-item:last-child { border-bottom: none; }
    .reminder-item:hover { background: var(--surface2); }

    .reminder-check {
      width: 18px; height: 18px; border: 1.5px solid var(--border2);
      border-radius: 50%; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .reminder-check:hover { border-color: var(--accent); }
    .reminder-check.paid { background: var(--accent); border-color: var(--accent); }
    .reminder-check.paid::after { content: '✓'; color: white; font-size: 0.65rem; font-weight: 600; }

    .reminder-name { font-size: 0.9rem; color: var(--ink); font-weight: 400; }
    .reminder-meta { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }

    .reminder-due {
      font-size: 0.72rem; font-weight: 500; padding: 3px 8px; border-radius: 3px;
      white-space: nowrap;
    }
    .reminder-due.overdue  { background: var(--red-bg); color: var(--red); }
    .reminder-due.soon     { background: rgba(193,122,74,0.1); color: var(--warn); }
    .reminder-due.ok       { background: var(--green-bg); color: var(--green); }

    .reminder-amount { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.1rem; color: var(--ink); white-space: nowrap; }

    /* ── MODAL ── */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,20,0.4); backdrop-filter: blur(4px); z-index: 300; place-items: center; }
    .overlay.open { display: grid; }
    .modal { background: var(--surface); border: 1px solid var(--border); padding: 44px; width: 100%; max-width: 440px; box-shadow: 0 24px 60px rgba(26,26,20,0.15); animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1) both; border-radius: 4px; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .modal-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.4rem; font-weight: 600; margin-bottom: 28px; color: var(--ink); }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 0.68rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink2); margin-bottom: 8px; }
    input, select { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--ink); font-family: 'DM Sans', sans-serif; font-size: 0.92rem; font-weight: 300; padding: 12px 16px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; border-radius: 4px; }
    input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,107,82,0.1); }
    select option { background: var(--surface); }
    .type-toggle { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .type-btn { padding: 12px; text-align: center; font-family: 'DM Sans', sans-serif; font-size: 0.72rem; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; border: none; background: var(--bg); color: var(--muted); transition: all 0.2s; }
    .type-btn.active-income  { background: var(--green-bg); color: var(--green); font-weight: 500; }
    .type-btn.active-expense { background: var(--red-bg); color: var(--red); font-weight: 500; }
    .modal-actions { display: flex; gap: 12px; margin-top: 28px; }

    /* ── EMPTY ── */
    .empty-state { padding: 52px; text-align: center; font-size: 0.82rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border); grid-column: 1 / -1; }

    /* ── MODO FOCO ── */
    .foco-active .tx-amount,
    .foco-active .card-value,
    .foco-active #dash-balance,
    .foco-active #dash-income,
    .foco-active #dash-expense,
    .foco-active #txs-ingresos,
    .foco-active #txs-fijos,
    .foco-active #txs-variables,
    .foco-active #txs-saldo,
    .foco-active #txs-ahorro,
    .foco-active #txs-mayor,
    .foco-active .nw-value,
    .foco-active #nw-total,
    .foco-active #nw-assets,
    .foco-active #nw-debts {
      color: transparent !important;
      background: var(--border) !important;
      border-radius: 4px !important;
      user-select: none !important;
    }
    .foco-btn { 
      display:flex; align-items:center; gap:8px; width:100%;
      padding:8px 12px; border:1px solid var(--border);
      background:transparent; color:var(--muted);
      font-family:'DM Sans',sans-serif; font-size:0.7rem;
      font-weight:500; letter-spacing:0.1em; text-transform:uppercase;
      cursor:pointer; border-radius:4px; transition:all 0.2s;
    }
    .foco-btn:hover { border-color:var(--accent); color:var(--accent); }
    .foco-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

    /* ── CURRENCY SWITCH ── */
    .currency-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface); border: 1px solid var(--border);
      padding: 10px 20px; margin-bottom: 20px;
    }
    .currency-bar-left { font-size: 0.72rem; color: var(--muted); }
    .tc-badge { font-size: 0.68rem; color: var(--muted2); margin-left: 8px; }
    .cur-switch { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .cur-switch-btn {
      font-family: 'DM Sans', sans-serif; font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 6px 16px; border: none; cursor: pointer;
      background: transparent; color: var(--muted); transition: all 0.2s;
    }
    .cur-switch-btn.active { background: var(--accent); color: white; }

    /* ── EXPORT BUTTON ── */
    .btn-export {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 8px 16px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }
    .btn-export:hover { background: var(--accent); color: white; }

    /* ── INSIGHT CARD ── */
    .insight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 24px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .insight-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      width: 36px;
      text-align: center;
    }
    .insight-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .insight-body {
      font-size: 0.82rem;
      color: var(--ink2);
      line-height: 1.65;
    }
    .insight-good { border-left: 4px solid var(--green); }
    .insight-warn { border-left: 4px solid var(--warn); }
    .insight-bad  { border-left: 4px solid var(--red); }
    .insight-info { border-left: 4px solid var(--accent); }

    /* ── RESPONSIVE ── */
    /* ── MOBILE NAV ── */
    .hamburger {
      display: none;
      position: fixed;
      top: 32px;
      right: 16px;
      z-index: 9999;
      width: 40px;
      height: 40px;
      border-radius: 6px;
      background: var(--accent);
      border: none;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(61,107,82,0.25);
      align-items: center;
      justify-content: center;
    }
    .mobile-overlay {
      display: none;
      position: fixed;
      top: 0; bottom: 0;
      left: 300px; right: 0;
      background: rgba(20,20,14,0.4);
      z-index: 8888;
    }
    .mobile-overlay.open { display: block; }
